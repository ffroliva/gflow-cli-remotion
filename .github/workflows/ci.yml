name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node must be set up BEFORE pnpm/action-setup: pnpm 11.3 self-installs
      # via Node and requires >=22.13, which the runner's default Node doesn't
      # satisfy. pnpm version itself comes from package.json "packageManager".
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v4

      # Re-run setup-node now that pnpm exists, to enable the pnpm store cache.
      - name: Enable pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test (unit + integration + contract + lint)
        run: pnpm test:ci
