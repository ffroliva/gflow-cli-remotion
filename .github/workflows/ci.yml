name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # Use Corepack (bundled with Node 22) instead of pnpm/action-setup —
      # that action self-installs pnpm under its own Node 20 runtime, which
      # trips pnpm 11.3's engines.node>=22.13 check under engine-strict.
      # Corepack runs pnpm on the Node 22 set up above; version comes from
      # package.json "packageManager".
      - name: Enable pnpm via Corepack
        run: corepack enable

      - name: Re-resolve Node with pnpm store cache
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test (unit + integration + contract + lint)
        run: pnpm test:ci
